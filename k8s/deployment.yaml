apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-ecommerce
  template:
    metadata:
      labels:
        app: flask-ecommerce
    spec:
      containers:
        - name: flask-ecommerce
          image: 528049653644.dkr.ecr.us-east-1.amazonaws.com/flask-ecommerce:latest
          ports:
            - containerPort: 5000