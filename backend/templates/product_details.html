<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <h1>🛒 My Shopping Website</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart</a>
    </nav>
</header>

<div class="details-box">
    <img src="{{ product[3] }}" width="300">

    <h2>{{ product[1] }}</h2>
    <h3>₹{{ product[2] }}</h3>
    <p>Category: {{ product[4] }}</p>
    <p>Rating: ⭐⭐⭐⭐☆</p>
    <p>This is a good quality product with fast delivery option.</p>

    <a href="/add-to-cart/{{ product[1] }}/{{ product[2] }}">
        <button>Add To Cart</button>
    </a>
</div>

</body>
</html>
